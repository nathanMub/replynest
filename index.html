    <script>
      // Safety patch for environments where window.fetch has only a getter (e.g. some sandbox iframes)
      (function() {
        function patchFetch(obj) {
          if (!obj) return;
          try {
            const originalFetch = obj.fetch;
            if (originalFetch) {
              Object.defineProperty(obj, 'fetch', {
                get: function() { return originalFetch; },
                set: function(val) { 
                  console.warn('Sandbox safety patch: prevented overwrite of fetch'); 
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {
            // Ignore if property is non-configurable or fails
          }
        }
        patchFetch(window);
        patchFetch(typeof globalThis !== 'undefined' ? globalThis : null);
        patchFetch(typeof global !== 'undefined' ? global : null);
      })();
